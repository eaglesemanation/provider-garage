apiVersion: bucket.garage.m.crossplane.io/v1alpha1
kind: Permission
metadata:
  annotations:
    meta.upbound.io/example-id: bucket/v1alpha1/permission
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: crossplane-system
spec:
  forProvider:
    accessKeyIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    bucketIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    owner: false
    read: true
    write: true

---

apiVersion: bucket.garage.m.crossplane.io/v1alpha1
kind: Bucket
metadata:
  annotations:
    meta.upbound.io/example-id: bucket/v1alpha1/permission
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: crossplane-system
spec:
  forProvider:
    globalAlias: my-bucket

---

apiVersion: key.garage.m.crossplane.io/v1alpha1
kind: Key
metadata:
  annotations:
    meta.upbound.io/example-id: bucket/v1alpha1/permission
  labels:
    testing.upbound.io/example-name: admin
  name: admin
  namespace: crossplane-system
spec:
  forProvider:
    name: admin-key

---

apiVersion: key.garage.m.crossplane.io/v1alpha1
kind: Key
metadata:
  annotations:
    meta.upbound.io/example-id: bucket/v1alpha1/permission
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: crossplane-system
spec:
  forProvider:
    name: my-app-key

---

apiVersion: key.garage.m.crossplane.io/v1alpha1
kind: Key
metadata:
  annotations:
    meta.upbound.io/example-id: bucket/v1alpha1/permission
  labels:
    testing.upbound.io/example-name: readonly
  name: readonly
  namespace: crossplane-system
spec:
  forProvider:
    name: readonly-key
